<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Percentage Increase Calculator</title>
  <link rel="canonical" href="https://percentageincreasecalculator.app/" />
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    h1 { color: #2c3e50; }
    label { display: block; margin-top: 12px; font-weight: bold; }
    input { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; }
    button { margin-top: 16px; padding: 10px 20px; background: #2980b9; color: #fff; border: none; cursor: pointer; border-radius: 4px; font-size: 16px; }
    button:hover { background: #1a6ea8; }
    #result { margin-top: 20px; font-size: 1.2em; }
    .cta { display: inline-block; margin-top: 24px; padding: 12px 28px; background: #27ae60; color: #fff; text-decoration: none; border-radius: 4px; font-size: 16px; font-weight: bold; }
    .cta:hover { background: #1e8449; }
    footer { margin-top: 40px; font-size: 0.9em; color: #555; }
  </style>
</head>
<body>
  <h1>Percentage Increase Calculator</h1>
  <p>Calculate the percentage increase between two values instantly.</p>

  <label>Original Value
    <input type="number" id="original" placeholder="100" />
  </label>
  <label>New Value
    <input type="number" id="newval" placeholder="150" />
  </label>
  <button onclick="calculate()">Calculate</button>
  <div id="result"></div>

  <br />
  <a class="cta" href="https://percentageincreasecalculator.app/">Percentage Increase Calculator</a>

  <footer>
    <p>For the full-featured tool, visit <a href="https://percentageincreasecalculator.app/">Percentage Increase Calculator</a>.</p>
  </footer>

  <script>
    function calculate() {
      const orig = parseFloat(document.getElementById('original').value);
      const newv = parseFloat(document.getElementById('newval').value);
      if (isNaN(orig) || isNaN(newv)) { document.getElementById('result').textContent = 'Please fill in all fields.'; return; }
      const pct = ((newv - orig) / Math.abs(orig)) * 100;
      document.getElementById('result').textContent = 'Percentage Increase: ' + pct.toFixed(2) + '%';
    }
  </script>
</body>
</html>
